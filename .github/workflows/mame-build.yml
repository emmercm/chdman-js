# Requires repo secret: PERSONAL_ACCESS_TOKEN with permissions:
#   Contents: read and write
#   Pull Requests: read and write

name: MAME Build

on:
  workflow_dispatch:
    inputs:
      mame_ref:
        description: 'MAME GitHub branch, tag, or SHA (e.g. "mame0281")'
        required: true
        type: string
      auto-merge:
        description: 'Auto-merge pull request?'
        required: true
        type: boolean
        default: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CHDMANJS_REF: ${{ github.head_ref || github.ref }}

  MAME_REF: ${{ inputs.mame_ref || 'mame0287' }}
  # `make` options
  EMULATOR: 0
  TOOLS: 1
  TESTS: 0
  IGNORE_GIT: 1
  NOWERROR: 1
  DEBUG: 0
  SYMBOLS: 0
  OPTIMIZE: s

jobs:
  build-linux:
    name: build-linux ${{ matrix.nodejs_arch }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            docker_image: i386/alpine:latest
            docker_arch: linux/386
            nodejs_arch: ia32
          - os: ubuntu-latest
            docker_image: alpine:latest
            docker_arch: linux/amd64
            nodejs_arch: x64
          - os: ubuntu-24.04-arm
            docker_image: alpine:latest
            docker_arch: linux/arm/v7
            archopts: -mfpu=neon
            nodejs_arch: arm
          - os: ubuntu-24.04-arm
            docker_image: alpine:latest
            docker_arch: linux/arm64/v8
            nodejs_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mamedev/mame
          ref: ${{ env.MAME_REF }}
      - uses: docker/setup-qemu-action@v3
      - name: Build
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ matrix.docker_image }}
          shell: sh
          options: |
            --platform ${{ matrix.docker_arch }}
            --volume ${{ github.workspace }}:/build
            --workdir /build
            --env EMULATOR
            --env TOOLS
            --env TESTS
            --env IGNORE_GIT
            --env NOWERROR
            --env DEBUG
            --env SYMBOLS
            --env OPTIMIZE
          run: |
            set -euxo pipefail
            apk add --no-cache build-base python3 \
              sdl2-dev sdl2_ttf-dev fontconfig-dev pulseaudio-dev qt5-qtbase-dev \
              alsa-lib-dev libxi-dev libxinerama-dev libxrandr-dev libxext-dev \
              asio-dev expat-dev expat-static zlib-dev zlib-static zstd-dev zstd-static \
              libjpeg-turbo-dev libjpeg-turbo-static \
              sqlite-dev sqlite-static utf8proc-dev \
              glm-dev rapidjson-dev
            # MAME's bundled bx (3rdparty/bx) only detects glibc, MSVC, MinGW, libc++, BSD, and Bionic — there is no
            # musl branch in bx/include/bx/platform.h. On Alpine (musl), bx therefore falls through to its
            # BX_CRT_NONE path, which #includes a "crt0.h" that doesn't exist in the source tree → fatal compile
            # error in 3rdparty/bx/src/crtnone.cpp. Defining __GLIBC__ ourselves makes bx take its glibc branch
            # (platform.h:238); musl's API surface is glibc-compatible enough for the bx CRT shim to work.
            #
            # The fseeko64/ftello64 aliases are needed because bx's glibc branch calls those LFS64 functions in
            # 3rdparty/bx/src/file.cpp; musl doesn't provide *_64 variants since its off_t is already 64-bit, so
            # we map them to the regular fseeko/ftello which are equivalent on musl.
            #
            # feenableexcept/fedisableexcept are glibc-only floating-point-exception control functions used by
            # MAME's netlist (src/lib/netlist/plib/pexception.cpp), which TOOLS=1 links into nltool/nlwav. musl
            # doesn't ship them. Mapping them to a constant 0 keeps the call sites well-formed (the return value
            # is the previous FP mask; "0 = nothing was enabled" is harmless for a CLI tool that doesn't actually
            # trap on FP exceptions). The parens are backslash-escaped because make's compile recipe runs through
            # busybox sh, and unquoted (x) in the expanded command line would be parsed as a subshell.
            #
            # _POSIX_C_SOURCE is defined to suppress ALSA's <alsa/global.h> from redefining struct timeval/
            # timespec. ALSA's header guards them as: #ifdef __GLIBC__ #if !defined(_POSIX_C_SOURCE) ... — and
            # since we fake __GLIBC__, ALSA enters the glibc branch and tries to redefine structs that musl's
            # <sys/types.h> already provides. Setting _POSIX_C_SOURCE=200809L makes the inner guard false and
            # ALSA uses musl's existing definitions. This is needed because portaudio (compiled bundled, since
            # Alpine ships no libportaudio.a) #includes <alsa/asoundlib.h>. _GNU_SOURCE is then layered on top
            # to re-expose extensions (alloca, full struct timespec under all include paths) that strict POSIX
            # mode would hide; ALSA's struct-redef guard only checks for _POSIX_C_SOURCE so adding _GNU_SOURCE
            # doesn't undo the suppression.
            make VERBOSE=1 -j$(nproc) -r \
              TARGETOS=linux \
              USE_SYSTEM_LIB_ASIO=1 \
              USE_SYSTEM_LIB_EXPAT=1 \
              USE_SYSTEM_LIB_ZLIB=1 \
              USE_SYSTEM_LIB_ZSTD=1 \
              USE_SYSTEM_LIB_JPEG=1 \
              USE_SYSTEM_LIB_SQLITE3=1 \
              USE_SYSTEM_LIB_UTF8PROC=1 \
              USE_SYSTEM_LIB_GLM=1 \
              USE_SYSTEM_LIB_RAPIDJSON=1 \
              ARCHOPTS='-U_FORTIFY_SOURCE -D__GLIBC__=2 -D__GLIBC_MINOR__=35 -D_POSIX_C_SOURCE=200809L -D_GNU_SOURCE=1 -Dfseeko64=fseeko -Dftello64=ftello -Dfeenableexcept\(x\)=0 -Dfedisableexcept\(x\)=0 -ffunction-sections -fdata-sections -flto ${{ matrix.archopts }}' \
              LDOPTS='-static -Wl,--gc-sections -flto'

            # Test binary
            ./chdman --help || true

            # Strip binary
            apk add --no-cache binutils
            ls -al chdman
            strip chdman
            ls -al chdman
      - name: Test binary
        run: |
          set -x
          file chdman
          readelf -d chdman
          if readelf -d chdman | grep -q NEEDED; then
            echo "ERROR: binary has dynamic dependencies, expected fully static"
            readelf -d chdman | grep NEEDED
            exit 1
          fi
          if ! file chdman | grep -qE 'statically linked|static-pie linked'; then
            echo "ERROR: 'file' does not report the binary as statically linked"
            exit 1
          fi
      - name: Rename binary
        run: |
          dir="artifacts/packages/chdman-linux-${{ matrix.nodejs_arch }}"
          mkdir -p "${dir}"
          mv chdman "${dir}/"
          ls -al "${dir}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.nodejs_arch }}-${{ github.sha }}
          path: artifacts/**/chdman
          if-no-files-found: error

  # https://github.com/mamedev/mame/blob/4505d5459fed086d35f08d7572cb55cd661cd707/.github/workflows/ci-macos.yml
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15-intel, macos-15]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mamedev/mame
          ref: ${{ env.MAME_REF }}
      - name: Install dependencies
        run: brew install --overwrite python3 sdl2 sdl3
      - name: Build
        env:
          USE_LIBSDL: 1
          ARCHOPTS: "-ffunction-sections -fdata-sections -flto -Wl,-dead_strip"
        run: make "-j$(sysctl -n hw.physicalcpu)" -r
      - name: Make portable
        run: |
          set -x
          otool -L chdman
          otool -L chdman | awk '{print $1}' | grep -E "^$(brew --prefix)" | while read -r file; do
            cp "${file}" ./
            install_name_tool -change "${file}" "@executable_path/$(basename "${file}")" chdman
          done
          brew uninstall --ignore-dependencies sdl2 sdl3
      - name: Test binary
        run: |
          set -x
          ./chdman --help || true
          file chdman
          otool -L chdman
      - name: Strip binary
        run: |
          ls -al chdman
          strip chdman
          ls -al chdman
      - uses: actions/setup-node@v4
      - name: Rename binary
        run: |
          # shellcheck disable=SC2016
          dir="artifacts/packages/chdman-$(node --eval 'console.log(`${process.platform}-${process.arch}`)')"
          mkdir -p "${dir}"
          mv chdman ./*.dylib "${dir}/"
          ls -al "${dir}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.os }}-${{ github.sha }}
          path: |
            artifacts/**/chdman
            artifacts/**/*.dylib
          if-no-files-found: error

  # https://github.com/mamedev/mame/blob/4505d5459fed086d35f08d7572cb55cd661cd707/.github/workflows/ci-windows.yml
  build-windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            msystem: mingw64
            nodejs_arch: x64
          # Windows ARM64 builds started being published with MAME v0.281 (Sep 2025)
          - os: windows-11-arm
            msystem: clangarm64
            nodejs_arch: arm64
            pacboy: gcc-compat:p
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: mamedev/mame
          ref: ${{ env.MAME_REF }}
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: curl git make
          pacboy: clang:p gcc:p libc++:p lld:p python:p llvm:p ${{ matrix.pacboy }}
      - run: |
          set -x
          echo $PATH
          python --version
          python3 --version
      - name: Build
        env:
          OVERRIDE_AR: "llvm-ar"
          OVERRIDE_CC: clang
          OVERRIDE_CXX: clang++
          ARCHOPTS: "-fuse-ld=lld -ffunction-sections -fdata-sections -flto -Wl,--gc-sections"
        run: make VERBOSE=1 -j$(nproc) -r
      - name: Test binary
        run: |
          ./chdman.exe --help || true
      - name: Strip binary
        run: |
          ls -al chdman.exe
          strip chdman.exe
          ls -al chdman.exe
      - name: Rename binary
        run: |
          dir="artifacts/packages/chdman-win32-${{ matrix.nodejs_arch }}"
          mkdir -p "${dir}"
          mv chdman.exe "${dir}/"
          ls -al "${dir}/"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }}-${{ matrix.msystem }}-${{ github.sha }}
          path: artifacts/**/chdman.exe
          if-no-files-found: error

  git-update:
    if: ${{ !startsWith(github.event_name, 'pull_request') }}  # debug protection
    needs:
      - build-linux
      - build-macos
      - build-windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHDMANJS_REF }}
      - name: Delete old macoS .dylibs
        run: |
          rm packages/*-darwin-*/*.dylib
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: actions/setup-node@v4
      - id: bump-and-commit
        run: |
          package_name=$(jq --raw-output '.name' packages/chdman/package.json)
          major_version=$(npm show "${package_name}" --json | jq --raw-output '.versions | .[]' | sed 's/\.[0-9]*//g' | sort | tail -1)
          # shellcheck disable=SC2001
          minor_version=$(echo "${MAME_REF}" | sed 's/[^0-9]*//g' | sed 's/^0*//')
          previous_version=$(npm show "${package_name}" --json | jq --raw-output '.versions | .[]' | grep "${minor_version}" | tail -1)
          if [[ "${previous_version}" != "" ]]; then
            # shellcheck disable=SC2001
            new_patch_version=$(echo "$(echo "${previous_version}" | sed 's/[0-9]*\.//g') + 1" | bc)
            new_version="${major_version}.${minor_version}.${new_patch_version}"
          else
            new_version="${major_version}.${minor_version}.0"
          fi
          lerna version "${new_version}" --yes || true

          chmod +x packages/chdman-*-*/chdman*
          ls -lR
          git add package*.json lerna.json packages

          USER_EMAIL="${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          echo "USER_EMAIL=${USER_EMAIL}" >> "${GITHUB_OUTPUT}"
          git config --global user.email "${USER_EMAIL}"

          USER_NAME="$(gh api "/users/${GITHUB_ACTOR}" | jq .name -r)"
          echo "USER_NAME=${USER_NAME}" >> "${GITHUB_OUTPUT}"
          git config --global user.name "${USER_NAME}"

          PACKAGE_VERSION="$(jq --raw-output '.version' packages/chdman/package.json)"
          echo "PACKAGE_VERSION=${PACKAGE_VERSION}" >> "${GITHUB_OUTPUT}"
          git commit -m "v${PACKAGE_VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}
      # Create the pull request, and optionally mark it as auto-merge
      - id: create-pull-request
        uses: peter-evans/create-pull-request@v6
        with:
          # GitHub won't run workflows off of events from the `github-actions` user
          # But also, I want the PR to be created under my name for cosmetic reasons
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          author: ${{ steps.bump-and-commit.outputs.USER_NAME }} <${{ steps.bump-and-commit.outputs.USER_EMAIL }}>
          branch: ${{ github.actor }}/${{ steps.bump-and-commit.outputs.PACKAGE_VERSION }}
          delete-branch: true
          title: v${{ steps.bump-and-commit.outputs.PACKAGE_VERSION }}
          assignees: ${{ !inputs.auto-merge && github.repository_owner || '' }}
          reviewers: ${{ (!inputs.auto-merge && github.repository_owner != github.actor) && github.repository_owner || '' }}
      - if: ${{ steps.create-pull-request.outputs.pull-request-number }}
        run: |
          {
            echo "# v${{ steps.bump-and-commit.outputs.PACKAGE_VERSION }}"
            echo ""
            echo "${{ steps.create-pull-request.outputs.pull-request-url }}"
          } >> "${GITHUB_STEP_SUMMARY}"
      - if: ${{ steps.create-pull-request.outputs.pull-request-number && inputs.auto-merge }}
        run: gh pr merge "${{ steps.create-pull-request.outputs.pull-request-number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
